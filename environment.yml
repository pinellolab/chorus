name: chorus
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core Python
  - python=3.10

  # Essential data science libraries
  - numpy>=1.21.0
  - pandas>=1.3.0
  - matplotlib>=3.5.0
  - seaborn>=0.11.0
  - scipy>=1.7.0

  # Jupyter for notebooks
  - jupyter>=1.0
  - notebook>=6.4
  - ipykernel>=6.0

  # Core utilities
  - tqdm>=4.62.0
  - click>=8.0  # For CLI

  # Bioinformatics tools (needed by all oracles)
  - pysam>=0.19.0
  - pyfaidx>=0.7.0
  - biopython>=1.79
  - samtools>=1.15  # For genome indexing
  - htslib>=1.15    # Provides bgzip/tabix (coolbox visualization needs bgzip)
  # gtfsort: Linux-only (bioconda), install separately on Linux: mamba install -c bioconda gtfsort

  # Visualization tools
  - pygenometracks>=3.8
  - pillow>=12.2.0  # CVE-2026-25990 (PSD OOB) + CVE-2026-40192 (FITS decompression bomb)

  # For testing
  - pytest>=6.0
  - pytest-cov>=2.0

  # For development
  - black>=22.0
  - flake8>=4.0

  # pip-only packages (coolbox >=0.4.0 requires pip; conda version lacks ARM64 support)
  - pip
  - pip:
    # coolbox 0.4.0 is QUARANTINED on PyPI (no installable files as of 2026-06-16),
    # which breaks `mamba env create` for everyone. Install from the official
    # upstream repo, SHA-pinned to the 0.4.0 release tag for reproducibility /
    # supply-chain safety. Cross-platform (pure pip, requires-python >=3.7).
    # Revert to `coolbox>=0.4.0` once PyPI un-quarantines the project.
    # See audits/2026-06-16_macos_arm64_fresh_install_audit.md (finding #1).
    - coolbox @ git+https://github.com/GangCaoLab/CoolBox.git@651b930dbc59e3aa732f7ecc98e0af09e19e2719
    - oxbow>=0.4.0
    - fastmcp>=3.0
    - huggingface_hub>=0.20.0
