name: chorus-epinformerseq
channels:
  - conda-forge
  - bioconda

dependencies:
  # Core Python
  - python>=3.10

  # Scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0

  # Bioinformatics (FASTA / BAM access for variant scoring)
  - pyfaidx>=0.7.0
  - pysam>=0.19.0

  # Utilities
  - tqdm>=4.62.0
  - h5py>=3.6.0
  - requests
  # HF Hub for chorus-epinformerseq mirror
  - huggingface_hub>=0.20

  # PyTorch via pip (cross-platform: Apple-MPS on macOS, CUDA on Linux if user
  # installs the CUDA wheel index, CPU otherwise).  enhancer_predictor_256bp
  # is ~1 MB so CPU/MPS inference is fine for variant scoring.
  - pip
  - pip:
    - torch>=2.0

  # Visualization (optional but matches other chorus oracle envs).
  # seaborn is imported eagerly by chorus.utils.visualization at package
  # init, so it is required at runtime even if no plots are made.
  - matplotlib
  - seaborn
