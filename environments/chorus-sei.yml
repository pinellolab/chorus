name: chorus-sei
channels:
  - conda-forge
  - bioconda
  - pytorch
dependencies:
  # Core Python
  - python=3.10
  
  # Essential scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  - numba
  
  # Core bioinformatics
  - pysam>=0.19.0
  - biopython>=1.79
  - pyfaidx>=0.7.0
  
  # Utilities
  - tqdm>=4.62.0
  - h5py>=3.6.0
  # HF Hub for chorus-sei mirror (with Zenodo fallback)
  - huggingface_hub>=0.20
  
  # PyTorch ecosystem
  # NB: the previous pin (pytorch>=1.13.0,<2.0.0 + cudatoolkit=11.7) caused a
  # libsolv explosion against current conda-forge (50+ minute hangs on
  # fresh installs — see audits/2026-04-25_v27_fresh_install_new_user.md).
  # Sei uses standard nn.Module / DataLoader features that are API-stable
  # across torch 2.x; let conda resolve a compatible CUDA toolkit alongside.
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  
  # Additional dependencies
  - pip

  # Visualization
  - matplotlib>=3.5.0
  - seaborn>=0.11.0

  # Jupyter support
  - jupyter
  - notebook
  - ipykernel
